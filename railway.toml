[build]
builder = "NIXPACKS"

[deploy]
# Endpoint simples que não depende do Actuator nem do banco
healthcheckPath = "/health"
healthcheckTimeout = 600
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Configurações para economizar recursos
[deploy.env]
JAVA_OPTS = "-Xmx256m -Xms128m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+UseStringDeduplication"
# Use "prod" para PostgreSQL (configure DATABASE_URL no painel do Railway)
SPRING_PROFILES_ACTIVE = "prod" 