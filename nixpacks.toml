[phases.setup]
nixPkgs = ["maven", "openjdk17"]

# Build sempre limpo: remove target, limpa Maven e gera novo JAR (sem usar cache de layers)
[phases.build]
cmds = [
  "rm -rf target",
  "mvn clean package -DskipTests -U -B"
]

[phases.start]
cmd = "java -Xmx256m -Xms128m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -jar target/nordeste-servicos-0.0.1-SNAPSHOT.jar"

[variables]
# Força rebuild completo no Railway (não reutiliza cache de build)
NIXPACKS_NO_CACHE = "1"
JAVA_OPTS = "-Xmx256m -Xms128m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+UseStringDeduplication"
SPRING_PROFILES_ACTIVE = "test"
