[phases.setup]
nixPkgs = ["maven", "openjdk17"]

[phases.build]
cmds = ["mvn clean package -DskipTests"]

# Usa start.sh para garantir que PORT e server.address são aplicados em runtime (Railway)
[phases.start]
cmd = "sh start.sh"

[variables]
JAVA_OPTS = "-Xmx256m -Xms128m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+UseStringDeduplication"
SPRING_PROFILES_ACTIVE = "prod"
